<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Louis Vuitton Perfume</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Montserrat', sans-serif;
    background: #fafafa;
    color: #111;
}

/* HEADER */
header {
    position: sticky;
    top: 0;
    background: white;
    display: flex;
    justify-content: space-between;
    padding: 20px 60px;
    border-bottom: 1px solid #eee;
    z-index: 1000;
}

header h1 {
    font-family: 'Playfair Display', serif;
    letter-spacing: 4px;
}

nav a {
    margin-left: 30px;
    text-decoration: none;
    color: #111;
    font-weight: 300;
    position: relative;
}

nav a::after {
    content: "";
    width: 0;
    height: 1px;
    background: black;
    position: absolute;
    left: 0;
    bottom: -5px;
    transition: 0.3s;
}

nav a:hover::after {
    width: 100%;
}

/* BANNER */
.banner {
    height: 90vh;
    background: url('https://images.unsplash.com/photo-1596462502278-27bfdc403348') center/cover;
    display: flex;
    align-items: center;
    justify-content: center;
}

.banner h2 {
    color: white;
    font-size: 50px;
    font-family: 'Playfair Display', serif;
    letter-spacing: 3px;
    background: rgba(0,0,0,0.3);
    padding: 20px 40px;
}

/* TITLE */
.title {
    text-align: center;
    margin: 80px 0 40px;
    font-size: 32px;
    font-family: 'Playfair Display', serif;
}

/* PRODUCTS */
.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 40px;
    padding: 0 80px 80px;
}

.product {
    background: white;
    overflow: hidden;
    transition: 0.4s;
}

.product img {
    width: 100%;
    height: 350px;
    object-fit: cover;
    transition: 0.4s;
}

.product:hover img {
    transform: scale(1.05);
}

.product-info {
    padding: 20px;
    text-align: center;
}

.product-info h3 {
    font-weight: 500;
    margin-bottom: 10px;
}

.price {
    color: #bfa14a;
    margin-bottom: 10px;
}

button {
    border: 1px solid black;
    padding: 10px 25px;
    background: transparent;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: black;
    color: white;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 40px;
    background: #111;
    color: white;
}
</style>
</head>

<body>

<header>
    <h1>LOUIS VUITTON</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">Perfume</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="banner">
    <h2>Luxury Women's Fragrance</h2>
</section>

<h2 class="title">Exclusive Collection</h2>

<section class="products">

    <div class="product">
        <img src="https://tse1.explicit.bing.net/th/id/OIP.iq6mx0fyOABgMYjJnP9mtAHaHa?rs=1&pid=ImgDetMain&o=7&rm=3">
        <div class="product-info">
            <h3>Attrape-Rêves</h3>
            <p class="price">8.500.000đ</p>
            <button onclick="buy()">Add to Cart</button>
        </div>
    </div>

    <div class="product">
        <img src="https://tse1.mm.bing.net/th/id/OIP.XcZwauhnbP2jDZ4sM0LNcQHaHa?w=700&h=700&rs=1&pid=ImgDetMain&o=7&rm=3">
        <div class="product-info">
            <h3>Rose des Vents</h3>
            <p class="price">8.200.000đ</p>
            <button onclick="buy()">Add to Cart</button>
        </div>
    </div>

    <div class="product">
        <img src="https://tse3.mm.bing.net/th/id/OIP.dHFK_1nvZHQMZ9LToJw1rQHaHa?w=1080&h=1080&rs=1&pid=ImgDetMain&o=7&rm=3">
        <div class="product-info">
            <h3>Spell On You</h3>
            <p class="price">8.700.000đ</p>
            <button onclick="buy()">Add to Cart</button>
        </div>
    </div>

</section>

<footer>
    © 2026 Louis Vuitton Perfume | Luxury Experience
</footer>

<script>
function buy() {
    alert("Đã thêm vào giỏ hàng 🛒");
}
</script>

</body>
</html>
